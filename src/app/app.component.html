<mat-sidenav-container class="sidenav-container">
  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="over" [(opened)]="sidenavOpened" class="sidenav">
    <div class="sidenav-header">
      <h2>{{ title }}</h2>
      <p class="company-subtitle">Manufacturing Excellence</p>
    </div>
    
    <mat-nav-list>
      <a mat-list-item 
         *ngFor="let item of menuItems" 
         [routerLink]="item.route" 
         routerLinkActive="active-link"
         (click)="sidenav.toggle()">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
        <span *ngIf="item.badge" class="badge badge-info" matListItemMeta>{{ item.badge }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <p class="version">Version 1.0.0</p>
      <p class="copyright">© 2026 Indica Industries</p>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <!-- Top Toolbar -->
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
      
      <div class="toolbar-content">
        <div class="toolbar-left">
          <img src="assets/logo.svg" alt="Logo" class="logo" onerror="this.style.display='none'">
          <span class="toolbar-title">{{ title }}</span>
        </div>
        
        <div class="toolbar-right">
          <span class="user-info">
            <mat-icon class="user-icon">account_circle</mat-icon>
            <span class="user-name">Admin User</span>
          </span>
          <button mat-icon-button class="notification-btn">
            <mat-icon [matBadge]="3" matBadgeColor="warn">notifications</mat-icon>
          </button>
        </div>
      </div>
    </mat-toolbar>

    <!-- Page Content -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
